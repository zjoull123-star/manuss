<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw Local Manus Console</title>
    <link rel="stylesheet" href="/ui/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Local Manus Console</p>
          <h1>本地任务编排台</h1>
          <p class="lede">
            直接查看当前本地 Manus runtime 的任务、步骤、审批、产物和 Python sandbox 输出。
          </p>
        </div>
        <div style="display: flex; gap: 12px; align-items: start;">
          <div class="runtime-card" id="runtime-card">
            <span class="runtime-label">Runtime</span>
            <strong id="runtime-mode">loading</strong>
            <span id="runtime-detail">connecting...</span>
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px; padding-top: 4px;">
            <button class="theme-toggle" id="theme-toggle" title="切换主题">🌓</button>
            <label class="auto-refresh-toggle">
              <input type="checkbox" id="auto-refresh-toggle" checked />
              <span>自动刷新</span>
            </label>
          </div>
        </div>
      </header>

      <main class="grid">
        <section class="panel panel-form">
          <div class="panel-head">
            <h2>提交任务</h2>
            <span class="pill">API intake</span>
          </div>
          <form id="task-form">
            <label>
              <span>用户 ID</span>
              <input id="user-id" name="userId" type="text" value="local_console_user" />
            </label>
            <label>
              <span>目标</span>
              <textarea
                id="goal"
                name="goal"
                rows="5"
                placeholder="例如：用 Python 分析数据并生成 markdown 总结"
              >用 Python 分析 12, 18, 25, 40 这四个数字，输出 JSON 和 markdown 摘要</textarea>
            </label>
            <label>
              <span>Recipe（可选）</span>
              <select id="recipe-id" name="recipeId">
                <option value="">自动匹配</option>
              </select>
            </label>
            <label>
              <span>创建时附件（可选）</span>
              <input id="create-upload-input" name="createUploads" type="file" multiple />
            </label>
            <div class="form-actions">
              <button type="submit">创建任务</button>
              <button id="refresh-button" type="button" class="ghost">刷新列表</button>
            </div>
          </form>
          <p class="form-note" id="submit-result">等待提交。</p>
        </section>

        <section class="panel panel-list">
          <div class="panel-head">
            <h2>最近任务</h2>
            <span class="pill" id="task-count">0</span>
          </div>
          <div class="task-list" id="task-list"></div>
          <div class="detail-section">
            <h3>质量指标</h3>
            <div class="event-list" id="quality-metrics"></div>
          </div>
          <div class="detail-section">
            <div class="panel-head">
              <h3>基准运行</h3>
              <button id="run-smoke-benchmark" type="button" class="ghost">跑 Smoke</button>
            </div>
            <div class="event-list" id="benchmark-runs"></div>
          </div>
        </section>

        <section class="panel panel-detail">
          <div class="panel-head">
            <h2>任务详情</h2>
            <span class="pill" id="selected-task-status">未选择</span>
          </div>
          <div class="detail-empty" id="detail-empty">选择左侧任务查看详情。</div>
          <div class="detail-body hidden" id="detail-body">
            <div class="detail-meta">
              <div>
                <span class="meta-label">任务 ID</span>
                <strong id="detail-task-id">-</strong>
              </div>
              <div>
                <span class="meta-label">目标</span>
                <strong id="detail-goal">-</strong>
              </div>
            </div>

            <div class="detail-section">
              <h3>任务操作</h3>
              <div class="task-actions" id="task-controls"></div>
              <p class="form-note" id="task-action-result">等待操作。</p>
              <div class="upload-panel">
                <label class="upload-label" for="task-upload-input">上传 CSV / XLSX / JSON / TXT / MD</label>
                <input id="task-upload-input" type="file" multiple />
                <button id="task-upload-button" type="button" class="ghost">上传到当前任务</button>
              </div>
            </div>

            <div class="detail-section">
              <h3>最终交付物</h3>
              <div class="artifact-list" id="final-artifact-panel"></div>
            </div>

            <div class="detail-section split">
              <div>
                <h3>最终校验</h3>
                <div class="artifact-list" id="final-validation-panel"></div>
              </div>
              <div>
                <h3>引用与复用</h3>
                <div class="artifact-list" id="reference-list"></div>
              </div>
            </div>

            <div class="detail-section">
              <h3>步骤</h3>
              <div class="step-timeline" id="step-timeline"></div>
              <div class="step-list" id="step-list"></div>
            </div>

            <div class="detail-section split">
              <div>
                <h3>审批</h3>
                <div class="approval-list" id="approval-list"></div>
              </div>
              <div>
                <h3>作业</h3>
                <div class="job-list" id="job-list"></div>
              </div>
            </div>

            <div class="detail-section split">
              <div>
                <h3>产物</h3>
                <div class="artifact-list" id="artifact-list"></div>
              </div>
              <div>
                <h3>已索引产物</h3>
                <div class="tool-call-list" id="indexed-artifact-list"></div>
              </div>
            </div>

            <div class="detail-section">
              <h3>工具调用</h3>
              <div class="tool-call-list" id="tool-call-list"></div>
            </div>

            <div class="detail-section">
              <h3>实时日志</h3>
              <div class="event-list" id="event-list"></div>
            </div>

            <div class="detail-section">
              <h3>产物预览</h3>
              <div class="artifact-preview" id="artifact-preview">
                <p class="muted">点击产物进行预览。</p>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/ui/app.js" type="module"></script>
  </body>
</html>
